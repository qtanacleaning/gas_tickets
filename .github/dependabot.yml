version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next-runtime:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
      test-and-types:
        patterns:
          - "@types/*"
          - "typescript"
          - "vitest"
